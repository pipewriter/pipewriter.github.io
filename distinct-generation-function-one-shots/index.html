<script>// Seeded WebGL background. Same seed -> same animated background, forever.
// Exposes window.PortfolioBackground.start(canvas, seed). Written as a classic
// script so it can be <script src>'d in the creator AND inlined into the
// published, fully-portable page.
(function () {
  'use strict';

  var VERT = [
    'attribute vec2 p;',
    'void main(){ gl_Position = vec4(p, 0.0, 1.0); }'
  ].join('\n');

  // Flowing fractal-noise plasma. Palette + motion are driven by uniforms
  // derived from the seed, so every project gets a distinct but stable look.
  var FRAG = [
    'precision highp float;',
    'uniform vec2 res;',
    'uniform float time;',
    'uniform float seed;',
    'uniform vec3 cA;',
    'uniform vec3 cB;',
    'uniform vec3 cC;',
    '',
    'mat2 rot(float a){ float c=cos(a), s=sin(a); return mat2(c,-s,s,c); }',
    'float hash(vec2 x){ return fract(sin(dot(x, vec2(127.1, 311.7))) * 43758.5453123); }',
    'float noise(vec2 x){',
    '  vec2 i = floor(x); vec2 f = fract(x);',
    '  float a = hash(i);',
    '  float b = hash(i + vec2(1.0, 0.0));',
    '  float c = hash(i + vec2(0.0, 1.0));',
    '  float d = hash(i + vec2(1.0, 1.0));',
    '  vec2 u = f*f*(3.0-2.0*f);',
    '  return mix(mix(a,b,u.x), mix(c,d,u.x), u.y);',
    '}',
    'float fbm(vec2 x){',
    '  float v = 0.0; float a = 0.5;',
    '  for(int i=0;i<6;i++){ v += a*noise(x); x = rot(0.5)*x*2.0 + 0.03; a *= 0.5; }',
    '  return v;',
    '}',
    'void main(){',
    '  vec2 uv = (gl_FragCoord.xy - 0.5*res) / min(res.x, res.y);',
    '  float t = time * 0.06;',
    '  vec2 q = uv * 1.6 + vec2(seed*0.013, seed*0.027);',
    '  vec2 a = vec2(fbm(q + vec2(t, -t)), fbm(q + vec2(-t*0.7, t*1.3) + 5.2));',
    '  vec2 b = vec2(fbm(q + 3.0*a + vec2(1.7, 9.2)), fbm(q + 3.0*a + vec2(8.3, 2.8)));',
    '  float f = fbm(q + 4.0*b + t*0.5);',
    '  vec3 col = mix(cA, cB, clamp(f*f*1.4, 0.0, 1.0));',
    '  col = mix(col, cC, clamp(length(b)*0.7, 0.0, 1.0));',
    '  // subtle vignette',
    '  float vig = 1.0 - 0.45*dot(uv, uv);',
    '  col *= vig;',
    '  gl_FragColor = vec4(col, 1.0);',
    '}'
  ].join('\n');

  function mulberry32(a) {
    return function () {
      a |= 0; a = (a + 0x6D2B79F5) | 0;
      var t = Math.imul(a ^ (a >>> 15), 1 | a);
      t = (t + Math.imul(t ^ (t >>> 7), 61 | t)) ^ t;
      return ((t ^ (t >>> 14)) >>> 0) / 4294967296;
    };
  }

  function hsl2rgb(h, s, l) {
    var a = s * Math.min(l, 1 - l);
    function f(n) {
      var k = (n + h * 12) % 12;
      return l - a * Math.max(-1, Math.min(Math.min(k - 3, 9 - k), 1));
    }
    return [f(0), f(8), f(4)];
  }

  function compile(gl, type, src) {
    var sh = gl.createShader(type);
    gl.shaderSource(sh, src);
    gl.compileShader(sh);
    if (!gl.getShaderParameter(sh, gl.COMPILE_STATUS)) {
      throw new Error(gl.getShaderInfoLog(sh) || 'shader compile failed');
    }
    return sh;
  }

  function start(canvas, seed) {
    seed = (seed | 0) || 1;
    var gl = canvas.getContext('webgl') || canvas.getContext('experimental-webgl');
    if (!gl) {
      // Graceful CSS fallback if WebGL is unavailable.
      var rnd0 = mulberry32(seed);
      var h0 = rnd0();
      canvas.style.background =
        'linear-gradient(135deg, hsl(' + (h0 * 360) + ',55%,18%), hsl(' + (((h0 + 0.5) % 1) * 360) + ',50%,10%))';
      return { stop: function () {} };
    }

    var prog = gl.createProgram();
    gl.attachShader(prog, compile(gl, gl.VERTEX_SHADER, VERT));
    gl.attachShader(prog, compile(gl, gl.FRAGMENT_SHADER, FRAG));
    gl.linkProgram(prog);
    gl.useProgram(prog);

    var buf = gl.createBuffer();
    gl.bindBuffer(gl.ARRAY_BUFFER, buf);
    gl.bufferData(gl.ARRAY_BUFFER, new Float32Array([-1, -1, 3, -1, -1, 3]), gl.STATIC_DRAW);
    var loc = gl.getAttribLocation(prog, 'p');
    gl.enableVertexAttribArray(loc);
    gl.vertexAttribPointer(loc, 2, gl.FLOAT, false, 0, 0);

    var uRes = gl.getUniformLocation(prog, 'res');
    var uTime = gl.getUniformLocation(prog, 'time');
    var uSeed = gl.getUniformLocation(prog, 'seed');
    var uA = gl.getUniformLocation(prog, 'cA');
    var uB = gl.getUniformLocation(prog, 'cB');
    var uC = gl.getUniformLocation(prog, 'cC');

    // Seed-derived palette: a base hue with two harmonious companions.
    var rnd = mulberry32(seed);
    var baseHue = rnd();
    var cA = hsl2rgb(baseHue, 0.6, 0.10 + rnd() * 0.06);
    var cB = hsl2rgb((baseHue + 0.08 + rnd() * 0.12) % 1, 0.7, 0.45 + rnd() * 0.15);
    var cC = hsl2rgb((baseHue + 0.5 + rnd() * 0.2) % 1, 0.75, 0.55 + rnd() * 0.1);
    gl.uniform3fv(uA, cA);
    gl.uniform3fv(uB, cB);
    gl.uniform3fv(uC, cC);
    gl.uniform1f(uSeed, seed % 1000);

    var running = true;
    var dpr = Math.min(window.devicePixelRatio || 1, 1.5);
    function resize() {
      var w = Math.floor(canvas.clientWidth * dpr);
      var h = Math.floor(canvas.clientHeight * dpr);
      if (canvas.width !== w || canvas.height !== h) {
        canvas.width = w; canvas.height = h;
      }
      gl.viewport(0, 0, canvas.width, canvas.height);
      gl.uniform2f(uRes, canvas.width, canvas.height);
    }
    window.addEventListener('resize', resize);

    var startT = performance.now();
    function frame() {
      if (!running) return;
      resize();
      gl.uniform1f(uTime, (performance.now() - startT) / 1000);
      gl.drawArrays(gl.TRIANGLES, 0, 3);
      requestAnimationFrame(frame);
    }
    requestAnimationFrame(frame);

    return {
      stop: function () { running = false; window.removeEventListener('resize', resize); }
    };
  }

  window.PortfolioBackground = { start: start };
})();
</script>
