<script>/* Seeded WebGL background. Same seed -> same look, forever.
   Exposes window.startBackground(canvas, seed). */
(function () {
  function mulberry32(a) {
    return function () {
      a |= 0; a = (a + 0x6D2B79F5) | 0;
      let t = Math.imul(a ^ (a >>> 15), 1 | a);
      t = (t + Math.imul(t ^ (t >>> 7), 61 | t)) ^ t;
      return ((t ^ (t >>> 14)) >>> 0) / 4294967296;
    };
  }

  const VERT = `
    attribute vec2 p;
    void main() { gl_Position = vec4(p, 0.0, 1.0); }`;

  const FRAG = `
    precision highp float;
    uniform vec2 uRes;
    uniform float uTime;
    uniform vec3 uA, uB, uC;
    uniform float uScale, uWarp, uRot;

    mat2 rot(float a){ float c=cos(a), s=sin(a); return mat2(c,-s,s,c); }
    float hash(vec2 p){ return fract(sin(dot(p, vec2(127.1,311.7)))*43758.5453); }
    float noise(vec2 p){
      vec2 i=floor(p), f=fract(p);
      vec2 u=f*f*(3.0-2.0*f);
      return mix(mix(hash(i),hash(i+vec2(1,0)),u.x),
                 mix(hash(i+vec2(0,1)),hash(i+vec2(1,1)),u.x),u.y);
    }
    float fbm(vec2 p){
      float v=0.0, a=0.5;
      for(int i=0;i<6;i++){ v+=a*noise(p); p=rot(uRot)*p*2.0; a*=0.5; }
      return v;
    }
    void main(){
      vec2 uv=(gl_FragCoord.xy - 0.5*uRes)/uRes.y;
      uv *= uScale;
      float t = uTime*0.04;
      vec2 q = vec2(fbm(uv + vec2(0.0, t)), fbm(uv + vec2(5.2, -t)));
      vec2 r = vec2(fbm(uv + uWarp*q + vec2(1.7, 9.2) + t),
                    fbm(uv + uWarp*q + vec2(8.3, 2.8) - t));
      float f = fbm(uv + uWarp*r);
      vec3 col = mix(uA, uB, clamp(f*f*1.6, 0.0, 1.0));
      col = mix(col, uC, clamp(length(q), 0.0, 1.0));
      col = mix(col, vec3(0.02,0.02,0.05), 0.25); // deepen
      col += 0.04*hash(gl_FragCoord.xy);           // dither
      gl_FragColor = vec4(col, 1.0);
    }`;

  function compile(gl, type, src) {
    const s = gl.createShader(type);
    gl.shaderSource(s, src); gl.compileShader(s);
    if (!gl.getShaderParameter(s, gl.COMPILE_STATUS)) throw new Error(gl.getShaderInfoLog(s));
    return s;
  }

  function hsl(h, s, l) {
    const a = s * Math.min(l, 1 - l);
    const f = (n) => {
      const k = (n + h / 30) % 12;
      return l - a * Math.max(-1, Math.min(k - 3, Math.min(9 - k, 1)));
    };
    return [f(0), f(8), f(4)];
  }

  window.startBackground = function (canvas, seed) {
    const rnd = mulberry32((seed | 0) || 1);
    const baseHue = rnd() * 360;
    const A = hsl(baseHue, 0.55, 0.18);
    const B = hsl((baseHue + 40 + rnd() * 60) % 360, 0.6, 0.42);
    const C = hsl((baseHue + 180 + rnd() * 60) % 360, 0.7, 0.55);
    const scale = 1.4 + rnd() * 1.8;
    const warp = 1.2 + rnd() * 2.4;
    const rotA = 0.4 + rnd() * 1.2;

    const gl = canvas.getContext('webgl') || canvas.getContext('experimental-webgl');
    if (!gl) { canvas.style.background = `rgb(${A.map((c) => (c * 255) | 0)})`; return; }

    const prog = gl.createProgram();
    gl.attachShader(prog, compile(gl, gl.VERTEX_SHADER, VERT));
    gl.attachShader(prog, compile(gl, gl.FRAGMENT_SHADER, FRAG));
    gl.linkProgram(prog); gl.useProgram(prog);

    const buf = gl.createBuffer();
    gl.bindBuffer(gl.ARRAY_BUFFER, buf);
    gl.bufferData(gl.ARRAY_BUFFER, new Float32Array([-1, -1, 3, -1, -1, 3]), gl.STATIC_DRAW);
    const loc = gl.getAttribLocation(prog, 'p');
    gl.enableVertexAttribArray(loc);
    gl.vertexAttribPointer(loc, 2, gl.FLOAT, false, 0, 0);

    const U = (n) => gl.getUniformLocation(prog, n);
    gl.uniform3fv(U('uA'), A); gl.uniform3fv(U('uB'), B); gl.uniform3fv(U('uC'), C);
    gl.uniform1f(U('uScale'), scale); gl.uniform1f(U('uWarp'), warp); gl.uniform1f(U('uRot'), rotA);

    function resize() {
      const dpr = Math.min(window.devicePixelRatio || 1, 2);
      canvas.width = Math.floor(canvas.clientWidth * dpr);
      canvas.height = Math.floor(canvas.clientHeight * dpr);
      gl.viewport(0, 0, canvas.width, canvas.height);
      gl.uniform2f(U('uRes'), canvas.width, canvas.height);
    }
    window.addEventListener('resize', resize);
    resize();

    const start = performance.now();
    (function frame() {
      gl.uniform1f(U('uTime'), (performance.now() - start) / 1000);
      gl.drawArrays(gl.TRIANGLES, 0, 3);
      requestAnimationFrame(frame);
    })();
  };
})();
</script>

<script>/* Shared portfolio renderer. Used by the live editor iframe (mode:'edit')
   and by the published static page (mode:'static').

   renderPortfolio(container, data, opts)
     opts.mode      'edit' | 'static'
     opts.thumbUrl(tile) -> url|null
     opts.pageUrl(tile)  -> url|null
     opts.edit      (edit mode only) callbacks:
        setTitle(kind, ids, value)   kind: 'portfolio'|'group'|'tile'
        addGroup()
        addTiles(gid, uris[])
        capture(gid, tid)
        deleteTile(gid, tid)
        deleteGroup(gid)
*/
(function () {
  function el(tag, attrs, kids) {
    const e = document.createElement(tag);
    if (attrs) for (const k in attrs) {
      if (k === 'class') e.className = attrs[k];
      else if (k === 'text') e.textContent = attrs[k];
      else if (k.startsWith('on') && typeof attrs[k] === 'function') e.addEventListener(k.slice(2), attrs[k]);
      else if (attrs[k] != null) e.setAttribute(k, attrs[k]);
    }
    for (const c of [].concat(kids || [])) if (c != null) e.appendChild(typeof c === 'string' ? document.createTextNode(c) : c);
    return e;
  }

  function editable(tag, value, placeholder, onCommit, cls) {
    const e = el(tag, { class: cls, contenteditable: 'true', 'data-ph': placeholder });
    e.textContent = value || '';
    const commit = () => onCommit(e.textContent.trim());
    e.addEventListener('blur', commit);
    e.addEventListener('keydown', (ev) => {
      if (ev.key === 'Enter' && tag !== 'div') { ev.preventDefault(); e.blur(); }
    });
    return e;
  }

  window.renderPortfolio = function (container, data, opts) {
    const edit = opts.mode === 'edit' ? opts.edit : null;
    container.innerHTML = '';

    // Header ---------------------------------------------------------
    const header = el('header', { class: 'pf-header' });
    if (edit) {
      header.appendChild(editable('h1', data.portfolioTitle, 'Portfolio title…',
        (v) => edit.setTitle('portfolio', {}, v), 'pf-title'));
    } else {
      header.appendChild(el('h1', { class: 'pf-title', text: data.portfolioTitle || 'Portfolio' }));
    }
    container.appendChild(header);

    // Groups ---------------------------------------------------------
    data.groups.forEach((g) => {
      const section = el('section', { class: 'pf-group' });
      const gh = el('div', { class: 'pf-group-head' });
      if (edit) {
        gh.appendChild(editable('h2', g.title, 'Group title…',
          (v) => edit.setTitle('group', { gid: g.id }, v), 'pf-group-title'));
        gh.appendChild(el('button', {
          class: 'pf-x', title: 'Delete group', text: '✕',
          onclick: () => { if (confirm('Delete this group and its tiles?')) edit.deleteGroup(g.id); },
        }));
      } else {
        gh.appendChild(el('h2', { class: 'pf-group-title', text: g.title || '' }));
      }
      section.appendChild(gh);

      const grid = el('div', { class: 'pf-grid' });
      g.tiles.forEach((t) => grid.appendChild(tileEl(g, t)));
      if (edit) grid.appendChild(addTileCard(g));
      section.appendChild(grid);
      container.appendChild(section);
    });

    if (edit) {
      container.appendChild(el('div', { class: 'pf-addgroup' }, [
        el('button', { class: 'pf-btn', text: '+ Add group', onclick: () => edit.addGroup() }),
      ]));
    }

    // Tile -----------------------------------------------------------
    function tileEl(g, t) {
      const wrap = el('div', { class: 'pf-tile' });
      const thumb = opts.thumbUrl(t);
      const page = opts.pageUrl(t);

      const rect = el('a', { class: 'pf-rect' + (thumb ? '' : ' empty') });
      if (page && !edit) { rect.setAttribute('href', page); rect.setAttribute('target', '_blank'); }
      if (thumb) {
        rect.appendChild(el('img', { src: thumb, alt: t.title || t.uri, loading: 'lazy' }));
      } else {
        rect.appendChild(el('div', { class: 'pf-rect-empty' }, [
          el('div', { class: 'pf-rect-uri', text: shortUri(t.uri) }),
          el('div', { class: 'pf-rect-hint', text: edit ? 'Click to open & capture thumbnail' : 'Open page' }),
        ]));
      }

      if (edit) {
        rect.addEventListener('click', (ev) => {
          ev.preventDefault();
          if (page) window.open(page, '_blank');
          edit.capture(g.id, t.id);
          wrap.classList.add('armed');
        });
        wrap.setAttribute('data-tid', t.id);
      }
      wrap.appendChild(rect);

      if (edit) {
        const meta = el('div', { class: 'pf-tile-meta' });
        meta.appendChild(editable('div', t.title, 'Page title…',
          (v) => edit.setTitle('tile', { gid: g.id, tid: t.id }, v), 'pf-tile-title'));
        meta.appendChild(el('button', {
          class: 'pf-x small', title: 'Remove tile', text: '✕',
          onclick: () => { if (confirm('Remove this tile?')) edit.deleteTile(g.id, t.id); },
        }));
        wrap.appendChild(meta);
        wrap.appendChild(el('div', { class: 'pf-armbadge', text: '● waiting for clipboard image…' }));
      } else if (t.title) {
        wrap.appendChild(el('div', { class: 'pf-tile-title', text: t.title }));
      }
      return wrap;
    }

    function addTileCard(g) {
      const card = el('div', { class: 'pf-tile pf-addtile' });
      const ta = el('textarea', { class: 'pf-ta', placeholder: 'Paste page URLs / file paths\n(one per line)…' });
      const btn = el('button', {
        class: 'pf-btn', text: '+ Add tiles',
        onclick: () => {
          const uris = ta.value.split(/\r?\n/).map((s) => s.trim()).filter(Boolean);
          if (uris.length) { btn.textContent = 'Cloning…'; btn.disabled = true; edit.addTiles(g.id, uris); }
        },
      });
      card.appendChild(ta);
      card.appendChild(btn);
      return card;
    }
  };

  function shortUri(u) {
    if (!u) return '';
    try { const x = new URL(u); return (x.hostname + x.pathname).replace(/\/$/, '') || u; }
    catch { return u.length > 48 ? '…' + u.slice(-46) : u; }
  }
})();
</script>
